<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List of Books</title>
</head>
<body>
    <h1>Books Available</h1>
    <ul>
        {% for books in books %}
            <li>
                <strong>{{ books.title }}</strong> by {{ books.author.name }}<br>
                Published on: {{ books.published_date }}<br>
                ISBN: {{ books.isbn }}
            </li>
        {% empty %}
            <li>No books available.</li>
        {% endfor %}

    </ul>
</body>
</html>
